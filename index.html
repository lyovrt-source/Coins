<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Կոպեկների Հաշվիչ Pro v2</title>
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            border: 1px solid #333;
            position: relative;
        }

        /* Settings Icon */
        .settings-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
            color: var(--primary);
            transition: transform 0.3s;
        }
        .settings-toggle:hover { transform: rotate(90deg); }

        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 1.4rem;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: #aaa;
            padding-left: 5px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 1px solid #333;
            border-radius: 12px;
            background: var(--input-bg);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: #333; }

        .clear-btn {
            position: absolute;
            right: 12px;
            background: transparent;
            color: #666;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        .clear-btn:hover { color: var(--primary); }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(145deg, #ffcc00, #ffb300);
            border-radius: 16px;
            text-align: center;
            color: #000;
        }

        .result-box span {
            display: block;
            font-size: 2.2rem;
            font-weight: 800;
        }

        /* Settings Modal-like Panel */
        #settings-panel {
            display: none;
            background: #252525;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px dashed var(--primary);
        }

        #settings-panel h3 {
            margin: 0 0 15px 0;
            font-size: 1rem;
            color: var(--primary);
        }

        .rate-input {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .rate-input input {
            width: 60%;
            padding: 8px;
            font-size: 0.9rem;
        }

        .save-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="settings-toggle" onclick="toggleSettings()">⚙️</div>
    
    <h2>LyovT coins</h2>

    <div id="settings-panel">
        <h3>1000 Կոպեկի Արժեքը</h3>
        <div class="rate-input">
            <label>֏ AMD:</label>
            <input type="number" id="set-amd" value="4900">
        </div>
        <div class="rate-input">
            <label>₽ RUB:</label>
            <input type="number" id="set-rub" value="1000">
        </div>
        <div class="rate-input">
            <label>$ USD:</label>
            <input type="number" id="set-usd" value="13.5">
        </div>
        <button class="save-btn" onclick="saveSettings()">Պահպանել Կուրսը</button>
    </div>

    <div class="input-group">
        <label>ՀՀ ԴՐԱՄ (AMD)</label>
        <div class="input-wrapper">
            <input type="number" id="amd" placeholder="0" oninput="calculate('amd')">
            <button class="clear-btn" onclick="clearField('amd')">✕</button>
        </div>
    </div>

    <div class="input-group">
        <label>ՌՈՒԲԼԻ (RUB)</label>
        <div class="input-wrapper">
            <input type="number" id="rub" placeholder="0" oninput="calculate('rub')">
            <button class="clear-btn" onclick="clearField('rub')">✕</button>
        </div>
    </div>

    <div class="input-group">
        <label>ԴՈԼԱՐ (USD)</label>
        <div class="input-wrapper">
            <input type="number" id="usd" placeholder="0" oninput="calculate('usd')">
            <button class="clear-btn" onclick="clearField('usd')">✕</button>
        </div>
    </div>

    <div class="result-box">
        <label style="color: #000; font-weight: bold;">ԸՆԴՀԱՆՈՒՐ ԿՈՊԵԿ</label>
        <span id="kopek">0</span>
    </div>
</div>

<script>
    // Կուրսերի սկզբնական արժեքները
    let config = {
        amd: 4900,
        rub: 1000,
        usd: 13.5
    };

    // Բեռնում ենք պահպանված տվյալները եթե կան
    window.onload = function() {
        const saved = localStorage.getItem('kopec_config');
        if (saved) {
            config = JSON.parse(saved);
            document.getElementById('set-amd').value = config.amd;
            document.getElementById('set-rub').value = config.rub;
            document.getElementById('set-usd').value = config.usd;
        }
    };

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        config.amd = parseFloat(document.getElementById('set-amd').value);
        config.rub = parseFloat(document.getElementById('set-rub').value);
        config.usd = parseFloat(document.getElementById('set-usd').value);
        
        localStorage.setItem('kopec_config', JSON.stringify(config));
        toggleSettings();
        alert('Կուրսը պահպանվեց։');
        resetAll();
    }

    function calculate(source) {
        const amdIn = document.getElementById('amd');
        const rubIn = document.getElementById('rub');
        const usdIn = document.getElementById('usd');
        const kopekOut = document.getElementById('kopek');

        let val = parseFloat(document.getElementById(source).value);
        
        if (isNaN(val)) {
            kopekOut.innerText = "0";
            return;
        }

        let totalKopeks = 0;

        // Հաշվարկ՝ հիմնվելով նոր կուրսերի վրա (Արժեք / (Կուրս / 1000))
        if (source === 'amd') {
            totalKopeks = val / (config.amd / 1000);
            rubIn.value = (totalKopeks * (config.rub / 1000)).toFixed(2);
            usdIn.value = (totalKopeks * (config.usd / 1000)).toFixed(2);
        } else if (source === 'rub') {
            totalKopeks = val / (config.rub / 1000);
            amdIn.value = (totalKopeks * (config.amd / 1000)).toFixed(0);
            usdIn.value = (totalKopeks * (config.usd / 1000)).toFixed(2);
        } else if (source === 'usd') {
            totalKopeks = val / (config.usd / 1000);
            amdIn.value = (totalKopeks * (config.amd / 1000)).toFixed(0);
            rubIn.value = (totalKopeks * (config.rub / 1000)).toFixed(2);
        }

        kopekOut.innerText = Math.floor(totalKopeks).toLocaleString();
    }

    function clearField(id) {
        document.getElementById(id).value = "";
        resetAll();
    }

    function resetAll() {
        document.getElementById('amd').value = "";
        document.getElementById('rub').value = "";
        document.getElementById('usd').value = "";
        document.getElementById('kopek').innerText = "0";
    }
</script>

</body>
</html>
