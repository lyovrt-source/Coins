<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyovT Coins Pro v7</title>
    <style>
        :root {
            --primary-bg: #1a4269;
            --input-bg: #89b3d9;
            --text-color: #ffffff;
            --secondary-text: #5e6b8c;
            --divider: #3b5f8a;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-color);
        }

        .main-container {
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .settings-toggle {
            position: absolute;
            top: -30px;
            right: 0px;
            cursor: pointer;
            font-size: 20px;
            color: #fff;
            transition: transform 0.3s;
        }
        .settings-toggle:hover { transform: rotate(90deg); }

        .section-title {
            font-size: 1.1rem;
            margin-bottom: 5px;
            padding-left: 5px;
            border-bottom: 2px solid var(--divider);
            padding-bottom: 2px;
            text-transform: lowercase;
        }

        .currency-block {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .currency-row {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--divider);
            position: relative;
        }
        .currency-row:last-child { border-bottom: none; }

        .flag {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .currency-label {
            margin-left: 15px;
            font-weight: bold;
            font-size: 1rem;
            width: 40px;
        }

        .input-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        input.currency-input {
            width: 80%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--secondary-text);
            color: var(--text-color);
            font-size: 1.2rem;
            outline: none;
            padding: 5px;
            text-align: right;
        }

        .clear-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin-left: 10px;
        }

        .brand-block {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 5px;
        }

        .brand-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #89b3d9;
            font-style: italic;
            letter-spacing: 1px;
            margin: 0;
        }

        .kopek-result-block {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px 20px;
            border-top: 5px solid #fff;
            margin-top: 10px;
            text-align: center;
        }

        .kopek-title {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        #kopek-input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 3.5rem;
            font-weight: bold;
            width: 100%;
            text-align: center;
            outline: none;
        }

        #settings-panel {
            display: none;
            background: var(--input-bg);
            color: var(--primary-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .setting-input { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .save-btn { width: 100%; padding: 8px; background: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: var(--primary-bg); }
        
        /* Հեռացնում ենք սլաքները number input-ից */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="settings-toggle" onclick="toggleSettings()">⚙️</div>
    
    <div class="section-title">արժույթ</div>

    <div class="currency-block">
        <div class="currency-row">
            <img src="https://flagpedia.net/data/flags/w580/am.png" class="flag">
            <span class="currency-label">AMD</span>
            <div class="input-wrapper">
                <input type="number" id="amd" class="currency-input" placeholder="0" oninput="calculateFromMoney('amd')">
                <button class="clear-btn" onclick="clearField('amd')">✕</button>
            </div>
        </div>
        <div class="currency-row">
            <img src="https://flagpedia.net/data/flags/w580/us.png" class="flag">
            <span class="currency-label">USD</span>
            <div class="input-wrapper">
                <input type="number" id="usd" class="currency-input" placeholder="0" oninput="calculateFromMoney('usd')">
                <button class="clear-btn" onclick="clearField('usd')">✕</button>
            </div>
        </div>
        <div class="currency-row">
            <img src="https://flagpedia.net/data/flags/w580/ru.png" class="flag">
            <span class="currency-label">RUB</span>
            <div class="input-wrapper">
                <input type="number" id="rub" class="currency-input" placeholder="0" oninput="calculateFromMoney('rub')">
                <button class="clear-btn" onclick="clearField('rub')">✕</button>
            </div>
        </div>
    </div>

    <div class="brand-block">
        <p class="brand-label">LyovT coins</p>
    </div>

    <div id="settings-panel">
        <h3>1000 Կոպեկի Արժեքը</h3>
        <div class="setting-input"><label>AMD:</label> <input type="number" id="set-amd" value="4900"></div>
        <div class="setting-input"><label>RUB:</label> <input type="number" id="set-rub" value="1000"></div>
        <div class="setting-input"><label>USD:</label> <input type="number" id="set-usd" value="13.5"></div>
        <button class="save-btn" onclick="saveSettings()">Պահպանել</button>
    </div>

    <div class="section-title">հաշվարկ</div>
    
    <div class="kopek-result-block">
        <div class="kopek-title">ընդհանուր կոպեկ</div>
        <input type="number" id="kopek-input" value="0" oninput="calculateFromKopek()">
    </div>
</div>

<script>
    let config = { amd: 4900, rub: 1000, usd: 13.5 };

    window.onload = function() {
        const saved = localStorage.getItem('kopec_config_v7');
        if (saved) {
            config = JSON.parse(saved);
            document.getElementById('set-amd').value = config.amd;
            document.getElementById('set-rub').value = config.rub;
            document.getElementById('set-usd').value = config.usd;
        }
    };

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        config.amd = parseFloat(document.getElementById('set-amd').value);
        config.rub = parseFloat(document.getElementById('set-rub').value);
        config.usd = parseFloat(document.getElementById('set-usd').value);
        localStorage.setItem('kopec_config_v7', JSON.stringify(config));
        toggleSettings();
        resetAll();
    }

    function calculateFromMoney(source) {
        const amdIn = document.getElementById('amd');
        const rubIn = document.getElementById('rub');
        const usdIn = document.getElementById('usd');
        const kopekIn = document.getElementById('kopek-input');

        let val = parseFloat(document.getElementById(source).value);
        
        if (isNaN(val) || val === 0) {
            kopekIn.value = 0;
            return;
        }

        let totalKopeks = 0;

        if (source === 'amd') {
            totalKopeks = val / (config.amd / 1000);
            rubIn.value = (totalKopeks * (config.rub / 1000)).toFixed(2);
            usdIn.value = (totalKopeks * (config.usd / 1000)).toFixed(2);
        } else if (source === 'rub') {
            totalKopeks = val / (config.rub / 1000);
            amdIn.value = (totalKopeks * (config.amd / 1000)).toFixed(0);
            usdIn.value = (totalKopeks * (config.usd / 1000)).toFixed(2);
        } else if (source === 'usd') {
            totalKopeks = val / (config.usd / 1000);
            amdIn.value = (totalKopeks * (config.amd / 1000)).toFixed(0);
            rubIn.value = (totalKopeks * (config.rub / 1000)).toFixed(2);
        }

        kopekIn.value = Math.round(totalKopeks);
    }

    function calculateFromKopek() {
        const amdIn = document.getElementById('amd');
        const rubIn = document.getElementById('rub');
        const usdIn = document.getElementById('usd');
        const kopekIn = document.getElementById('kopek-input');

        let kopeks = parseFloat(kopekIn.value);

        if (isNaN(kopeks) || kopeks === 0) {
            amdIn.value = "";
            rubIn.value = "";
            usdIn.value = "";
            return;
        }

        amdIn.value = (kopeks * (config.amd / 1000)).toFixed(0);
        rubIn.value = (kopeks * (config.rub / 1000)).toFixed(2);
        usdIn.value = (kopeks * (config.usd / 1000)).toFixed(2);
    }

    function clearField(id) {
        document.getElementById(id).value = "";
        resetAll();
    }

    function resetAll() {
        document.getElementById('amd').value = "";
        document.getElementById('rub').value = "";
        document.getElementById('usd').value = "";
        document.getElementById('kopek-input').value = 0;
    }
</script>

</body>
</html>
